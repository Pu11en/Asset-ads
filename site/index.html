<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Ads</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }

    header {
      background: #111;
      border-bottom: 2px solid var(--accent);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 { color: var(--accent); font-size: 1.3rem; }
    .brand-btn {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 700;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: all .2s;
    }
    .brand-btn.active {
      background: var(--accent);
      color: #0a0a0a;
    }

    main { max-width: 1100px; margin: 0 auto; padding: 20px; }
    h2 { color: #888; font-size: .9rem; margin-bottom: 14px; margin-top: 28px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
    h2:first-child { margin-top: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .card { background: #141414; border-radius: 10px; overflow: hidden; border: 1px solid #1e1e1e; transition: border-color .2s; cursor: pointer; }
    .card:hover { border-color: var(--accent); }
    .card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; background: #1a1a1a; }
    .card-info { padding: 8px 10px; }
    .card-name { font-size: .78rem; color: #aaa; font-weight: 600; }
    .card-type { font-size: .68rem; color: #555; margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }
    .empty { color: #444; font-size: .85rem; text-align: center; padding: 40px 0; }

    #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
    #modal.open { display: flex; }
    #modal-img { max-width: 90vw; max-height: 75vh; object-fit: contain; border-radius: 8px; }
    #modal-name { color: var(--accent); margin-top: 14px; font-size: 1.1rem; font-weight: 700; }
    #modal-type { color: #555; font-size: .75rem; margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }
    #modal-close { margin-top: 8px; color: #444; font-size: .8rem; }

    .section-label { font-size: .7rem; color: #444; margin-bottom: 8px; margin-top: 6px; text-transform: uppercase; letter-spacing: .07em; }
    .footer { text-align: center; padding: 30px; color: #2a2a2a; font-size: .75rem; }
  </style>
</head>
<body>

<header id="header">
  <h1 id="header-title">Island Splash</h1>
  <div>
    <button class="brand-btn active" onclick="setBrand('island-splash')">Island Splash</button>
    <button class="brand-btn" onclick="setBrand('cinco-h-ranch')">Cinco H Ranch</button>
  </div>
</header>

<main id="main">
  <div id="sections"></div>
</main>

<div id="modal" onclick="closeModal()">
  <img id="modal-img" src="" alt="">
  <div id="modal-name"></div>
  <div id="modal-type"></div>
  <div id="modal-close">click anywhere to close</div>
</div>

<div class="footer" id="footer"></div>

<script>
const BRANDS = {
  'island-splash': {
    title: 'Island Splash',
    accent: '#FF6B35',
    footer: 'Island Splash — Caribbean Tropical Drinks',
    sections: [
      {
        label: 'Generated Ads',
        items: [
          { f: "cinco-h-ranch_20260422_050226_891.png",         n: "Soap Ad v1",     t: "Generated Ad" },
          { f: "cinco-h-ranch_20260422_065352_601.png",         n: "Soap Ad v2",     t: "Generated Ad" },
          { f: "island-splash_mango-passion_f0f06f46.jpg",       n: "Mango Passion",  t: "Generated Ad" },
          { f: "island-splash_mango-passion-guava-pine-lime-mauby_96c96442.jpg", n: "Mango Multi", t: "Generated Ad" },
          { f: "island-splash_mauby_31e78b19.jpg",               n: "Mauby",          t: "Generated Ad" },
          { f: "island-splash_peanut-punch-pine-ginger-lime-guava-pine_46dc764c.jpg", n: "Peanut Punch", t: "Generated Ad" },
          { f: "island-splash_sorrel_22f5722f.jpg",              n: "Sorrel",         t: "Generated Ad" },
          { f: "island-splash_sorrel_8d2972da.jpg",              n: "Sorrel v2",      t: "Generated Ad" },
          { f: "island_splash_carousel_final.png",               n: "Carousel Final", t: "Generated Ad" },
          { f: "slide_1_mango_passion.png",                      n: "Slide 1 — Mango", t: "Generated Ad" },
          { f: "slide_2_lime_pine_ginger.png",                  n: "Slide 2 — Lime & Pine", t: "Generated Ad" },
          { f: "slide_3_guava_sorrel_mauby.png",                 n: "Slide 3 — Guava", t: "Generated Ad" },
          { f: "slide_4_peanut_punch.png",                       n: "Slide 4 — Peanut Punch", t: "Generated Ad" },
          { f: "slide_5_mango_passion_cta.png",                  n: "Slide 5 — CTA",   t: "Generated Ad" },
          { f: "ad_1_tree_stump.png",                            n: "Tree Stump Lifestyle", t: "Generated Ad" },
          { f: "ad_2_ingredient_flatlay.png",                    n: "Ingredient Flatlay",   t: "Generated Ad" },
          { f: "ad_3_mango_splash.png",                          n: "Mango Wave",           t: "Generated Ad" },
          { f: "ad_3_mango_splash_v2.png",                       n: "Mango Wave v2",        t: "Generated Ad" },
          { f: "ad_4_Panel1_Sorrel.png",                         n: "Sorrel Panel",         t: "Generated Ad" },
          { f: "ad_4_Panel2_Mango.png",                          n: "Mango Panel",          t: "Generated Ad" },
          { f: "ad_4_Panel3_PineGinger.png",                      n: "Pine Ginger Panel",    t: "Generated Ad" },
          { f: "ad_4_Panel4_GuavaPine.png",                       n: "Guava Pine Panel",     t: "Generated Ad" },
          { f: "ad_4_quad_panel.png",                            n: "Sorrel Quad Panel",   t: "Generated Ad" },
          { f: "ad_4_quad_panel_v2.png",                         n: "Sorrel Quad Panel v2", t: "Generated Ad" },
        ]
      },
      {
        label: 'Products',
        items: []
      }
    ]
  },
  'cinco-h-ranch': {
    title: 'Cinco H Ranch Naturals',
    accent: '#204050',
    footer: 'Cinco H Ranch Naturals — Texas Tallow Skincare',
    sections: [
      {
        label: 'Generated Ads',
        items: [
          { f: "cinco-h-ranch_20260422_050226_891.png", n: "Soap Ad v1", t: "Generated Ad" },
          { f: "cinco-h-ranch_20260422_065352_601.png", n: "Soap Ad v2", t: "Generated Ad" },
        ]
      },
      {
        label: 'Products',
        items: [
          { f: "honey-vanilla-soap.png", n: "Honey Vanilla Soap", t: "Product" },
          { f: "rejuvenating.png",        n: "Rejuvenating Face + Body Cream", t: "Product" },
          { f: "sunscreen.png",           n: "Sunscreen Stick",   t: "Product" },
        ]
      },
      {
        label: 'Reference Pools',
        items: [
          { f: "soap_ref.jpg",           n: "Soap — Ref 1", t: "Reference" },
          { f: "cream_ref.jpg",          n: "Cream — Ref 1", t: "Reference" },
          { f: "sunscreen_ref1.jpg",     n: "Sunscreen — Ref 1", t: "Reference" },
          { f: "sunscreen_ref2.jpg",     n: "Sunscreen — Ref 2", t: "Reference" },
          { f: "sunscreen_ref3.png",     n: "Sunscreen — Ref 3", t: "Reference" },
        ]
      }
    ]
  }
};

let currentBrand = 'island-splash';

function setBrand(brand) {
  currentBrand = brand;
  document.querySelectorAll('.brand-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === BRANDS[brand].title);
  });
  document.querySelectorAll('.brand-btn').forEach(b => {
    const isTarget = brand === 'island-splash' ? b.textContent.trim() === 'Island Splash' : b.textContent.trim() === 'Cinco H Ranch';
    b.classList.toggle('active', isTarget);
  });
  document.documentElement.style.setProperty('--accent', BRANDS[brand].accent);
  document.getElementById('header-title').textContent = BRANDS[brand].title;
  document.getElementById('footer').textContent = BRANDS[brand].footer;
  render();
}

function render() {
  const b = BRANDS[currentBrand];
  const sectionsEl = document.getElementById('sections');
  sectionsEl.innerHTML = '';

  b.sections.forEach(section => {
    if (section.items.length === 0) return;

    const heading = document.createElement('h2');
    heading.textContent = section.label;
    sectionsEl.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'grid';

    section.items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      const img = document.createElement('img');
      img.src = 'images/' + item.f;
      img.alt = item.n;
      img.loading = 'lazy';
      img.onerror = function() { this.style.display='none'; };
      const info = document.createElement('div');
      info.className = 'card-info';
      const name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = item.n;
      const type = document.createElement('div');
      type.className = 'card-type';
      type.textContent = item.t;
      info.appendChild(name);
      info.appendChild(type);
      card.appendChild(img);
      card.appendChild(info);
      card.onclick = () => openModal(item);
      grid.appendChild(card);
    });

    sectionsEl.appendChild(grid);
  });
}

function openModal(item) {
  document.getElementById('modal-img').src = 'images/' + item.f;
  document.getElementById('modal-name').textContent = item.n;
  document.getElementById('modal-type').textContent = item.t;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
document.documentElement.style.setProperty('--accent', BRANDS[currentBrand].accent);
document.getElementById('footer').textContent = BRANDS[currentBrand].footer;
render();
</script>

</body>
</html>
